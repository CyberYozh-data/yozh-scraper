services:
  web-scraper:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    shm_size: "1gb"

  open-crawler:
    build: yozh-crawler
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - SCRAPER_URL=http://web-scraper:8000
      - HOST=0.0.0.0
      - PORT=8001
    depends_on:
      - web-scraper
